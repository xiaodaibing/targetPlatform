<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目标&达成管理平台 · MVP 演示（孟加拉 Infinix）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root{
    --primary:#1677ff; --primary-dark:#0958d9; --primary-bg:#e6f4ff;
    --green:#52c41a; --green-bg:#f6ffed; --gold:#faad14; --gold-bg:#fffbe6;
    --red:#ff4d4f; --red-bg:#fff2f0; --text:#1f1f1f; --text-2:#595959;
    --text-3:#8c8c8c; --border:#f0f0f0; --border-2:#d9d9d9; --bg:#f5f7fa;
    --radius:8px; --shadow:0 1px 2px rgba(0,0,0,.03),0 1px 6px -1px rgba(0,0,0,.04);
  }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; line-height:1.55; }
  .app{ display:flex; min-height:100vh; }
  /* 侧边栏 */
  .sider{ width:230px; background:#001529; color:#fff; flex-shrink:0; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .logo{ padding:20px 18px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(255,255,255,.08); }
  .logo .mark{ width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg,#1677ff,#52c41a); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; }
  .logo .txt b{ font-size:15px; display:block; } .logo .txt span{ font-size:11px; color:#8c8c8c; }
  .nav{ padding:10px 0; }
  .nav-item{ padding:12px 20px; cursor:pointer; color:rgba(255,255,255,.72); display:flex; align-items:center; gap:12px; font-size:14px; border-left:3px solid transparent; transition:.15s; }
  .nav-item:hover{ color:#fff; background:rgba(255,255,255,.06); }
  .nav-item.active{ color:#fff; background:var(--primary); border-left-color:#fff; }
  .nav-item .ico{ width:18px; text-align:center; }
  .nav-group{ padding:14px 20px 6px; font-size:11px; color:#5a6a7a; letter-spacing:.5px; }
  /* 主区 */
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar{ height:60px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:20; }
  .topbar .crumb{ font-size:16px; font-weight:600; }
  .topbar .spacer{ flex:1; }
  .ctx{ display:flex; gap:8px; align-items:center; }
  .ctx .pill{ background:var(--primary-bg); color:var(--primary-dark); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; }
  .user{ display:flex; align-items:center; gap:8px; color:var(--text-2); }
  .avatar{ width:32px; height:32px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; }
  .content{ padding:22px 24px; flex:1; }
  .page{ display:none; } .page.active{ display:block; animation:fade .25s; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  /* 通用组件 */
  .card{ background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 20px; margin-bottom:18px; }
  .card-title{ font-size:15px; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .card-sub{ font-size:12px; color:var(--text-3); margin-bottom:14px; }
  .row{ display:flex; gap:16px; flex-wrap:wrap; }
  .kpi{ flex:1; min-width:180px; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 20px; }
  .kpi .label{ font-size:13px; color:var(--text-3); margin-bottom:8px; }
  .kpi .val{ font-size:26px; font-weight:700; letter-spacing:-.5px; }
  .kpi .val small{ font-size:14px; font-weight:500; color:var(--text-3); }
  .kpi .foot{ font-size:12px; margin-top:6px; color:var(--text-3); }
  .up{ color:var(--green); } .down{ color:var(--red); }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th,td{ padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
  th{ background:#fafafa; color:var(--text-2); font-weight:600; font-size:12px; }
  tbody tr:hover{ background:#fafcff; }
  td.num,th.num{ text-align:right; font-variant-numeric:tabular-nums; }
  .tag{ display:inline-block; padding:1px 8px; border-radius:4px; font-size:12px; line-height:1.6; border:1px solid transparent; }
  .tag-blue{ background:var(--primary-bg); color:var(--primary-dark); border-color:#91caff; }
  .tag-green{ background:var(--green-bg); color:#389e0d; border-color:#b7eb8f; }
  .tag-gold{ background:var(--gold-bg); color:#d48806; border-color:#ffe58f; }
  .tag-red{ background:var(--red-bg); color:#cf1322; border-color:#ffccc7; }
  .tag-gray{ background:#fafafa; color:var(--text-2); border-color:#d9d9d9; }
  .dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; }
  .dot-green{ background:var(--green);} .dot-gold{ background:var(--gold);} .dot-red{ background:var(--red);}
  .btn{ border:1px solid var(--border-2); background:#fff; color:var(--text); padding:6px 16px; border-radius:6px; cursor:pointer; font-size:14px; transition:.15s; }
  .btn:hover{ color:var(--primary); border-color:var(--primary); }
  .btn-primary{ background:var(--primary); color:#fff; border-color:var(--primary); }
  .btn-primary:hover{ background:var(--primary-dark); color:#fff; }
  .btn-sm{ padding:3px 10px; font-size:12px; }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .toolbar{ display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar .spacer{ flex:1; }
  .formula{ background:#0d1117; color:#c9d1d9; border-radius:6px; padding:14px 16px; font-family:"SFMono-Regular",Consolas,monospace; font-size:13px; line-height:1.9; overflow-x:auto; }
  .formula .k{ color:#79c0ff; } .formula .n{ color:#ffa657; } .formula .c{ color:#8b949e; }
  .factor-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .factor{ border:1px solid var(--border); border-radius:6px; padding:12px 14px; }
  .factor .ft{ font-size:12px; color:var(--text-3); margin-bottom:4px; }
  .factor .fv{ font-weight:600; }
  .progress{ height:8px; background:#f0f0f0; border-radius:10px; overflow:hidden; min-width:90px; }
  .progress .bar{ height:100%; border-radius:10px; }
  .banner{ padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:14px; display:flex; gap:10px; align-items:flex-start; }
  .banner-info{ background:var(--primary-bg); border:1px solid #91caff; color:var(--primary-dark); }
  .banner-warn{ background:var(--gold-bg); border:1px solid #ffe58f; color:#d48806; }
  .banner-success{ background:var(--green-bg); border:1px solid #b7eb8f; color:#389e0d; }
  .steps{ display:flex; gap:0; margin-bottom:8px; }
  .step{ flex:1; text-align:center; position:relative; font-size:12px; color:var(--text-3); }
  .step .circle{ width:26px; height:26px; border-radius:50%; background:#f0f0f0; color:var(--text-3); display:inline-flex; align-items:center; justify-content:center; margin-bottom:6px; font-weight:600; }
  .step.done .circle{ background:var(--green); color:#fff; } .step.done{ color:var(--green); }
  .step.active .circle{ background:var(--primary); color:#fff; } .step.active{ color:var(--primary); font-weight:600; }
  .step:not(:last-child):after{ content:""; position:absolute; top:13px; left:60%; width:80%; height:2px; background:#f0f0f0; z-index:-1; }
  .step.done:not(:last-child):after{ background:var(--green); }
  /* 弹窗 */
  .mask{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:100; }
  .mask.show{ display:flex; }
  .modal{ background:#fff; border-radius:10px; width:520px; max-width:92vw; padding:24px; box-shadow:0 6px 24px rgba(0,0,0,.2); }
  .modal h3{ font-size:17px; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .modal .mbody{ color:var(--text-2); font-size:13px; margin:12px 0 20px; }
  .modal .mfoot{ display:flex; justify-content:flex-end; gap:10px; }
  .gap-box{ background:var(--gold-bg); border:1px solid #ffe58f; border-radius:6px; padding:12px 14px; margin:12px 0; }
  .gap-box .g-row{ display:flex; justify-content:space-between; padding:3px 0; }
  .gap-box .g-row b{ color:#d48806; }
  .timeline{ list-style:none; }
  .timeline li{ position:relative; padding:0 0 22px 26px; }
  .timeline li:before{ content:""; position:absolute; left:6px; top:4px; width:10px; height:10px; border-radius:50%; background:var(--primary); }
  .timeline li:after{ content:""; position:absolute; left:10px; top:14px; bottom:-4px; width:2px; background:var(--border); }
  .timeline li:last-child:after{ display:none; }
  .timeline li.pending:before{ background:var(--border-2); }
  .timeline li .tl-t{ font-weight:600; } .timeline li .tl-d{ font-size:12px; color:var(--text-3); }
  .split-2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .mini-legend{ display:flex; gap:16px; font-size:12px; color:var(--text-2); margin-bottom:12px; }
  .note{ font-size:12px; color:var(--text-3); margin-top:8px; }
  .bar-chart{ display:flex; align-items:flex-end; gap:8px; height:150px; padding-top:10px; }
  .bar-chart .b{ flex:1; background:linear-gradient(180deg,#69b1ff,#1677ff); border-radius:4px 4px 0 0; position:relative; min-height:2px; }
  .bar-chart .b span{ position:absolute; top:-18px; left:0; right:0; text-align:center; font-size:11px; color:var(--text-2); }
  .bar-chart .b em{ position:absolute; bottom:-20px; left:0; right:0; text-align:center; font-size:11px; color:var(--text-3); font-style:normal; }
  .chart-wrap{ padding-bottom:24px; }
  .badge-cnt{ background:var(--red); color:#fff; border-radius:10px; padding:0 6px; font-size:11px; margin-left:6px; }
  .demo-tip{ position:fixed; right:18px; bottom:18px; background:#001529; color:#fff; padding:10px 16px; border-radius:8px; font-size:12px; opacity:.92; max-width:300px; z-index:50; }
  .demo-tip b{ color:#69b1ff; }
  /* 可编辑控件 */
  input.inp,select.inp{ border:1px solid var(--border-2); border-radius:5px; padding:5px 8px; font-size:13px; font-family:inherit; background:#fff; transition:.15s; }
  input.cell{ border:1px solid transparent; border-radius:5px; padding:4px 8px; font-size:13px; font-family:inherit; width:76px; text-align:right; font-variant-numeric:tabular-nums; background:#f6f9ff; font-weight:600; }
  input.cell:hover{ border-color:#91caff; }
  input.inp:focus,select.inp:focus,input.cell:focus{ border-color:var(--primary); outline:none; box-shadow:0 0 0 2px var(--primary-bg); background:#fff; }
  textarea.inp{ width:100%; resize:vertical; min-height:56px; line-height:1.6; }
  .edit-hint{ font-size:11px; color:var(--primary); background:var(--primary-bg); border:1px solid #91caff; padding:1px 8px; border-radius:10px; font-weight:500; }
  .param-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  .param{ display:flex; align-items:center; justify-content:space-between; gap:10px; border:1px solid var(--border); border-radius:6px; padding:10px 14px; }
  .param label{ font-size:13px; color:var(--text-2); }
  .param .u{ color:var(--text-3); font-size:12px; margin-left:4px; }
</style>
</head>

<div class="demo-tip">💡 <b>可编辑演示原型</b>：带浅蓝底的数字/输入框均可直接修改，改动即实时联动。数据为孟加拉 Infinix 模拟值。</div>

<script>
/* ============================================================
   模拟数据（孟加拉 Infinix · SO · 2026-08）—— 均为可变状态
   业务口径来源：docs/requirements/目标测算与拆解.md、执行追踪与预警.md
============================================================ */
const CTX = { country:"孟加拉", brand:"Infinix", type:"销量", period:"2026-08", days:31 };

/* —— 总目标测算：公式 F_ACT_DAILY = 上月日均激活 × 本月天数 × 去年同期增长幅度 —— */
const TOTAL = {
  formula: "日均激活测算法",
  dailyActivation: 1850,      // 上月(7月)日均激活【可编辑】
  monthDays: 31,              // 本月(8月)自然日
  yoyGrowth: 1.12,            // 去年同期增长幅度 +12%（历史趋势，描述性）【可编辑】
  upliftFactor: 1.15,         // 激励涨幅因子（在预测值之上人为拔高冲刺目标，默认1.15）【可编辑】
  dataLevel: "PARTIAL",       // FULL / PARTIAL / LIMITED
  get forecastValue(){ return Math.ceil(this.dailyActivation * this.monthDays * this.yoyGrowth); }, // 历史数据测算（预测）值
  get baseValue(){ return Math.ceil(this.forecastValue * this.upliftFactor); },                     // 叠加激励涨幅后的基准目标值
  adjustedValue: 75000,       // 人工微调后【可编辑】
  adjustReason: "历史测算 64,233 × 激励涨幅 1.15 = 73,868；再叠加 8 月排灯节促销与新品 HOT 50 Pro 铺货，人工微调至 75,000"
};
const FACTORS = [
  { name:"当月促销活动", val:"排灯节促销 8/1–8/15，覆盖 HOT/NOTE 系列", src:"DCR" },
  { name:"库存周转天数", val:"38 天（偏高，清尾压力）", src:"大数据" },
  { name:"清尾机型库存", val:"SMART 7 停产 · 账面 4,200 台", src:"大数据" },
  { name:"工厂产能", val:"—（一期无数据源）", src:"—" },
  { name:"季节系数", val:"去年 8 月 +6%", src:"DCR" },
  { name:"调价方向", val:"HOT 50 降价 → 建议调高", src:"人工录入" },
];
// 机型维度分解（90%+ 到机型，Others 归集，平板/重点单列，ROUNDUP）；alloc 可编辑
const MODELS = [
  { code:"HOT 50",       daily:210, alloc:14200, key:false, hsp:false, tablet:false, stock:null },
  { code:"HOT 50 Pro",   daily:180, alloc:12800, key:true,  hsp:true,  tablet:false, stock:null },
  { code:"NOTE 40",      daily:165, alloc:11000, key:false, hsp:false, tablet:false, stock:null },
  { code:"NOTE 40 Pro",  daily:120, alloc:9200,  key:true,  hsp:true,  tablet:false, stock:null },
  { code:"SMART 9",      daily:190, alloc:9800,  key:false, hsp:false, tablet:false, stock:null },
  { code:"GT 20 Pro",    daily:45,  alloc:3600,  key:true,  hsp:true,  tablet:false, stock:null },
  { code:"ZERO 30",      daily:22,  alloc:1800,  key:true,  hsp:true,  tablet:false, stock:null },
  { code:"XPAD 10",      daily:8,   alloc:900,   key:true,  hsp:false, tablet:true,  stock:1400 },
  { code:"SMART 7（清尾）", daily:6, alloc:1200, key:false, hsp:false, tablet:false, stock:4200, discount:0.85 },
  { code:"其他（清货老品归集）", daily:5, alloc:500, key:false, hsp:false, tablet:false, others:true, stock:null },
];

/* —— 人员目标拆解：孟加拉系数法 BD_COEFFICIENT_V1 —— */
const ALGO = { coverageRatio:0.90, minPerPerson:40, hspMode:"BY_MODEL", stockDiscount:0.85, softCheckRatio:0.90 };
const SIGMA_BASE = 54167;   // 全量 200 名 BP 基础值合计（用于反推系数）
// 拆解基数（待分配盘子 = 系数分子）：不硬绑总目标
//   FROM_TOTAL = 来自总目标×90%（默认）；MANUAL = 有总目标但人工改基数；NO_TOTAL = 本月总目标未建，人员目标先行
const ALLOC = {
  mode: "FROM_TOTAL",
  manualPool: 58500,        // 人工设定的待分配盘子（mode!=FROM_TOTAL 时生效）【可编辑】
  get hasTotal(){ return this.mode!=='NO_TOTAL'; },          // 是否已建总目标（决定 E-7 能否校验）
  get pool(){ return this.mode==='FROM_TOTAL' ? Math.round(TOTAL.adjustedValue*ALGO.coverageRatio) : this.manualPool; }
};
let COEF = 1.08;            // 系数 = 拆解基数(ALLOC.pool) ÷ Σbase(200 BP)
function recalcCoef(){ COEF = +((ALLOC.pool)/SIGMA_BASE).toFixed(2); }
// 中高端按机型：重点机型（HOT 50 Pro / NOTE 40 Pro / GT 20 Pro / ZERO 30）各自单列填报
const HSP_MODELS = MODELS.filter(m=>m.hsp).map(m=>m.code);
const H = (a,b,c,d)=>({[HSP_MODELS[0]]:a,[HSP_MODELS[1]]:b,[HSP_MODELS[2]]:c,[HSP_MODELS[3]]:d});
const hspTotal = bp => HSP_MODELS.reduce((s,m)=>s+(bp.hsp[m]||0),0);
// 「按总量」时把合计按国家级机型配额比例回分到各重点机型
function distributeHsp(bp,total){ const w=HSP_MODELS.map(m=>MODELS.find(x=>x.code===m).alloc); const ws=w.reduce((a,b)=>a+b,0); let used=0; HSP_MODELS.forEach((m,i)=>{ bp.hsp[m]= i===HSP_MODELS.length-1 ? total-used : Math.round(total*w[i]/ws); used+=bp.hsp[m]; }); }
// 样例 BP（实际 200 名，此处展示 12 名代表）；so/中高端 可编辑覆盖
const BPS = [
  { id:"BP001", name:"Rahim Uddin",    store:"Dhaka-Gulshan",     base:62, hsp:H(7,4,2,1),   flags:[] },
  { id:"BP002", name:"Karim Hossain",  store:"Dhaka-Mirpur",      base:48, hsp:H(4,3,1,1),   flags:[] },
  { id:"BP003", name:"Sultana Begum",  store:"Chittagong-Agrabad",base:35, hsp:H(2,2,1,0),   flags:[] },
  { id:"BP004", name:"Jamal Ahmed",    store:"Dhaka-Uttara",      base:90, hsp:H(10,7,3,2),  flags:[] },
  { id:"BP005", name:"Nasrin Akter",   store:"Sylhet-Zindabazar", base:16, hsp:H(1,1,0,0),   flags:["R2"] },
  { id:"BP006", name:"Farhan Kabir",   store:"Khulna-Sonadanga",  base:null, hsp:H(0,0,0,0), flags:["HISTORY_MISSING"] },
  { id:"BP007", name:"Tanvir Islam",   store:"Dhaka-Dhanmondi",   base:55, hsp:H(6,4,1,1),   flags:["STORE_TRANSFER"], storeAvg:50 },
  { id:"BP008", name:"Ayesha Siddiqua",store:"Chittagong-GEC",    base:42, hsp:H(4,2,1,1),   flags:[] },
  { id:"BP009", name:"Mizanur Rahman", store:"Rajshahi-Shaheb",   base:33, hsp:H(2,1,1,0),   flags:[] },
  { id:"BP010", name:"Shakil Hasan",   store:"Dhaka-Bashundhara", base:120,hsp:H(14,10,4,2), flags:[] },
  { id:"BP011", name:"Rubel Mia",      store:"Barisal-Sadar",     base:24, hsp:H(1,1,1,0),   flags:[] },
  { id:"BP012", name:"Nadia Sultana",  store:"Comilla-Kandirpar", base:70, hsp:H(7,5,3,1),   flags:["R1"], manual:150 },

// 提示性校验：其余 188 人目标合计随系数 COEF 等比缩放，样例 12 人实时求和 → 全量合计实时联动

/* ============ 工具函数 ============ */
const fmt = n => (n==null?"—":Number(n).toLocaleString("en-US"));
const pct = n => (n==null?"—":(n*100).toFixed(1) + "%");
// 人员目标计算：优先手动覆盖(so)→原始人工调整(manual)→系数法(base×COEF, ROUNDUP, min40, 换店取小)
function calcTarget(bp){
  if(bp.so!=null) return { val:bp.so, base:bp.base, floored:false, manual:true };
  if(bp.manual)  return { val:bp.manual, base:bp.base, floored:false, manual:true };
  let base = bp.base;
  if(base==null) return { val:ALGO.minPerPerson, base:null, floored:true };
  if(bp.flags.includes("STORE_TRANSFER") && bp.storeAvg!=null) base = Math.min(base, bp.storeAvg);
  const raw = Math.ceil(base*COEF);
  const val = Math.max(raw, ALGO.minPerPerson);
  return { val, base, raw, floored: val>raw };
}
function trackStatus(r){
  if(r.tgt===0) return {color:"gray", rate:null, label:"—", gap:0};
  const rate = r.act/r.tgt;
  const tp = TRACK.timeProgress;
  let color = rate>=tp ? "green" : (rate>=tp*TRACK.cfg.ratioThreshold ? "gold":"red");
  return { color, rate, gap: Math.max(r.tgt-r.act,0) };
}
function getAlerts(){
  const a=[]; const tp=TRACK.timeProgress;
  TRACK.rows.forEach(r=>{
    const rate = r.tgt? r.act/r.tgt : null;
    if(rate!=null && tp>=TRACK.cfg.timeFloor && rate < tp*TRACK.cfg.ratioThreshold)
      a.push({type:"LOW_ACHIEVEMENT", name:r.name, store:r.store, metric:"销量总量", detail:`达成率 ${pct(rate)} < 时间进度×30%(${pct(tp*TRACK.cfg.ratioThreshold)})`});
    if(r.zero>=TRACK.cfg.zeroSalesDays)
      a.push({type:"ZERO_SALES", name:r.name, store:r.store, metric:"销量总量", detail:`连续 ${r.zero} 天 0 销量（阈值 ${TRACK.cfg.zeroSalesDays} 天）`});
  });
  return a;
}

/* ============ 交互与编辑联动 ============ */
const PAGES={overview:["经营概览",renderOverview],total:["总目标测算",renderTotal],person:["人员目标拆解",renderPerson],approval:["目标审批（BPM）",renderApproval],tracking:["执行追踪与预警",renderTracking],rule:["国家规则包配置",renderRule]};
let CUR="overview";
function go(key){
  CUR=key;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.page===key));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const el=document.getElementById("page-"+key); el.innerHTML=PAGES[key][1](); el.classList.add("active");
  document.getElementById("crumb").textContent=PAGES[key][0];
  window.scrollTo(0,0);
}
function rerender(){ go(CUR); }
document.getElementById("nav").addEventListener("click",e=>{const it=e.target.closest(".nav-item"); if(it)go(it.dataset.page);});

/* —— 编辑处理器 —— */
function onTotal(f,v){ const n=parseFloat(v); if(!isNaN(n)){ TOTAL[f]=n; recalcCoef(); } rerender(); }
function onModel(i,v){ const n=parseInt(v,10); MODELS[i].alloc = isNaN(n)?0:n; rerender(); }
function onBP(id,f,v){ const bp=BPS.find(b=>b.id===id); if(!bp)return; const n=parseInt(v,10);
  if(f==='so'){ bp.so = (v===''||isNaN(n))?null:n; } rerender(); }
function onHspModel(id,m,v){ const bp=BPS.find(b=>b.id===id); if(!bp)return; const n=parseInt(v,10); bp.hsp[m]=isNaN(n)?0:n; rerender(); }
function onHspTotal(id,v){ const bp=BPS.find(b=>b.id===id); if(!bp)return; let n=parseInt(v,10); if(isNaN(n))n=0; distributeHsp(bp,Math.max(n,0)); rerender(); }
function regenPerson(){ BPS.forEach(bp=>{ delete bp.so; }); rerender(); }
function batchEdit(){
  const p=prompt("按比例统一调整样例 BP 的 SO 目标（输入百分比，如 110 表示上调 10%）：","100");
  if(p===null) return; const r=parseFloat(p); if(isNaN(r)) return;
  BPS.forEach(bp=>{ const c=calcTarget(bp); bp.so=Math.max(Math.round(c.val*r/100), ALGO.minPerPerson); });
  rerender();
}
function onAlgo(f,v){
  if(f==='hspMode'){ ALGO.hspMode=v; }
  else { const n=parseFloat(v); if(!isNaN(n)) ALGO[f]=n; }
  recalcCoef(); rerender();
}
function onTrackDays(v){ let n=parseInt(v,10); if(isNaN(n))return; n=Math.max(1,Math.min(n,TRACK.daysTotal));
  TRACK.daysPassed=n; TRACK.timeProgress=+(n/TRACK.daysTotal).toFixed(3); rerender(); }
function onTrackCfg(f,v){ const n=parseFloat(v); if(!isNaN(n)) TRACK.cfg[f]=n; rerender(); }
function onTrackAct(id,f,v){ const r=TRACK.rows.find(x=>x.id===id); if(!r)return; const n=parseInt(v,10); r[f]=isNaN(n)?0:n; rerender(); }
function onNation(f,v){ const n=parseInt(v,10); if(!isNaN(n)) TRACK.nation[f]=n; rerender(); }
// 拆解基数来源切换：离开 FROM_TOTAL 时用当前总目标×90% 预填人工盘子，避免数字突变
function onAllocMode(m){
  if(m!=='FROM_TOTAL' && ALLOC.mode==='FROM_TOTAL'){ ALLOC.manualPool = Math.round(TOTAL.adjustedValue*ALGO.coverageRatio); }
  ALLOC.mode=m; recalcCoef(); rerender();
}
function onAllocPool(v){ const n=parseInt(v,10); if(!isNaN(n)) ALLOC.manualPool=n; recalcCoef(); rerender(); }

/* —— 弹窗 —— */
function showModal(html){document.getElementById("modal").innerHTML=html; document.getElementById("mask").classList.add("show");}
function closeModal(){document.getElementById("mask").classList.remove("show");}
document.getElementById("mask").addEventListener("click",e=>{if(e.target.id==="mask")closeModal();});

function confirmTotal(){
  const last=TOTAL_VERSIONS[TOTAL_VERSIONS.length-1];
  if(TOTAL.adjustedValue!==last.value){
    const reason=(TOTAL.adjustReason||"").trim()||"（未填写调整原因）";
    TOTAL_VERSIONS.push({ ver:last.ver+1, time:nowStamp(), user:"当前用户（品牌经理）", value:TOTAL.adjustedValue, reason });
    rerender();
    showModal(`<h3><span class="tag tag-green">✓</span> 总目标已调整并记录新版本</h3><div class="mbody">国家总目标由 <b>${fmt(last.value)}</b> 调整为 <b>${fmt(TOTAL.adjustedValue)} 台</b>，已生成 <b>V${last.ver+1}</b> 并即时生效（一期调整不走审批流）。</div><div class="mfoot"><button class="btn btn-primary" onclick="closeModal()">知道了</button></div>`);
  } else {
    showModal(`<h3><span class="tag tag-green">✓</span> 总目标确认生效</h3><div class="mbody">国家总目标 <b>${fmt(TOTAL.adjustedValue)} 台</b> 与当前版本 <b>V${last.ver}</b> 一致，未产生新版本。人员目标线可独立发起，两线并行。</div><div class="mfoot"><button class="btn btn-primary" onclick="closeModal()">知道了</button></div>`);
  }
}
function savePersonVersion(){
  const el=document.getElementById('pvReason'); const reason=((el&&el.value)||"").trim()||"（未填写调整原因）";
  const last=PERSON_VERSIONS[PERSON_VERSIONS.length-1];
  const sum=SOFT.personSum; const changed=BPS.filter(bp=>bp.so!=null||bp.manual).length;
  PERSON_VERSIONS.push({ ver:last.ver+1, time:nowStamp(), user:"当前用户（品牌经理）", sum, changed, reason });
  rerender();
  showModal(`<h3><span class="tag tag-green">✓</span> 人员目标调整已记录新版本</h3><div class="mbody">已生成 <b>V${last.ver+1}</b>：Σ人员销量 <b>${fmt(sum)} 台</b>，其中 <b>${changed}</b> 名促销员为人工调整（样例口径）。一期调整不走审批流，即时留痕。</div><div class="mfoot"><button class="btn btn-primary" onclick="closeModal()">知道了</button></div>`);
}

function submitPerson(){
  if(!SOFT.hasCheck){
    showModal(`<h3><span class="tag tag-blue">ⓘ</span> 总目标未建，跳过提示性校验</h3><div class="mbody">本月总目标尚未建立，提示性校验（Σ人员 ≥ 总目标×90%）暂不进行。人员目标可<b>先行提交审批</b>；待总目标建立后系统自动回填校验结果。当前 Σ人员销量 <b>${fmt(SOFT.personSum)} 台</b>。</div><div class="mfoot"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="closeModal();go('approval')">提交 → 送审批</button></div>`);
    return;
  }
  if(SOFT.gap<=0){
    showModal(`<h3><span class="tag tag-green">✓</span> 提示性校验通过</h3><div class="mbody">人员目标销量合计 <b>${fmt(SOFT.personSum)} 台</b>（${pct(SOFT.ratio)}）已达总目标 90%，直接提交公司审批系统。</div><div class="mfoot"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="closeModal();go('approval')">提交 → 送审批</button></div>`);
    return;
  }
  showModal(`<h3><span style="color:var(--gold)">⚠</span> 提示性校验未达 90%</h3>
    <div class="mbody">人员目标销量合计低于总目标的 90%，系统仅提示、<b>不阻断</b>提交。你可以继续提交或返回修改。</div>
    <div class="gap-box"><div class="g-row"><span>Σ 人员销量目标</span><b>${fmt(SOFT.personSum)} 台</b></div><div class="g-row"><span>阈值（总目标 × 90%）</span><b>${fmt(SOFT.threshold)} 台</b></div><div class="g-row"><span>缺口 / 占比</span><b>${fmt(SOFT.gap)} 台（${pct(SOFT.ratio)}）</b></div></div>
    <div class="mfoot"><button class="btn" onclick="closeModal()">返回修改</button><button class="btn btn-primary" onclick="closeModal();go('approval')">继续提交 → 送审批</button></div>`);
}

function actApproval(res){
  const map={APPROVED:["已通过","审批通过，人员目标已发布生效，并已触发促销员通知（DCR App）。","tag-green"],REJECTED:["已驳回","品牌经理驳回，目标退回草稿，可修改后重新提交。","tag-red"],SUSPENDED:["已挂起","审批系统暂不可用，目标已挂起、不丢失；恢复后可续提交（降级路径）。","tag-gold"]};
  const m=map[res]; APPROVAL.status=res;
  showModal(`<h3><span class="tag ${m[2]}">${m[0]}</span> 审批结果</h3><div class="mbody">${m[1]}</div><div class="mfoot"><button class="btn btn-primary" onclick="closeModal();go('approval')">确定</button></div>`);
}

recalcCoef();
go("overview");
</script>
</body>
</html>
